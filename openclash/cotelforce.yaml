#自定义节点
proxies:
  - {name: 🏠 Direct, type: direct}

#订阅节点
proxy-providers:
  Airport1:
    url: "https://example.com/sub/xxxx"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    proxy: 🏠 Direct

  Airport2:
    url: "https://example.com/sub/xxxx"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    proxy: 🏠 Direct
    
# 全局配置 
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
# interface-name: enp6s18
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"
    - "+.qq.com"
    - "+.taobao.com"
    - "+.jd.com"
    - "+.alicdn.com"
    - "+.mi.com"
    - "+.xiaomi.com"

# 入站  
tun:
  enable: false

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private,cn"
    - "+.lan"
    - "+.local"
    - "+.localdomain"
    - "+.home.arpa"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "+.ntp.org.cn"
    - "+.pool.ntp.org"
    - "+.market.xiaomi.com"
    # tailscale组网
    - "+.tailscale.com"
    - "+.tailscale.io"
    - "+.ts.net"
    # 自己的网站
    - "+.698891.xyz"
    - "+.apioai.com"
    - "+.ktuai.com"
    - "+.coioai.com"
    - "+.tmgcai.com"
    - "+.cou.edu.kg"
    # GZU
    - "+.gzu.edu.cn"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

pr: &pr {type: select, proxies: [🏠 Direct, 🧭 Proxy Select]}

proxy-groups:
  - {name: 🧭 Proxy Select, type: select, proxies: [🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 📹 YouTube,      type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🅖 Google,       type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 👨🏿‍💻 GitHub,       type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🤖 AI,           type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🎬 Netflix,      type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: ✈️ Telegram,     type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🎵 TikTok,       type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🐳 Docker,       type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 𝕏 Twitter,       type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: ☁️ OneDrive,     type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🪟 Microsoft,    type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 💳 PayPal,       type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🍎 Apple,        type: select, proxies: [🧭 Proxy Select, 🏠 Direct], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|zoro|dedirock-ny|dedirock-la"}
  - {name: 🐟 Others,       <<: *pr}
  
rules:
  # 防止谷歌学术直连
  - DOMAIN-SUFFIX,scholar.google.com,🧭 Proxy Select
  - DOMAIN-SUFFIX,scholar.googleusercontent.com,🧭 Proxy Select
  # 学术直连
  - RULE-SET,scholar,🏠 Direct
  - RULE-SET,scholar_cn,🏠 Direct

  # tailscale组网直连
  - DOMAIN-SUFFIX,tailscale.com,🏠 Direct
  - DOMAIN-SUFFIX,tailscale.io,🏠 Direct
  - DOMAIN-SUFFIX,ts.net,🏠 Direct
  # cloudflare-tunnel直连
  - RULE-SET,cloudflare-tunnel,🏠 Direct
  
  # 自己的网站直连
  - DOMAIN-SUFFIX,698891.xyz,🏠 Direct
  - DOMAIN-SUFFIX,apioai.com,🏠 Direct
  - DOMAIN-SUFFIX,ktuai.com,🏠 Direct
  - DOMAIN-SUFFIX,coioai.com,🏠 Direct
  - DOMAIN-SUFFIX,tmgcai.com,🏠 Direct
  - DOMAIN-SUFFIX,cou.edu.kg,🏠 Direct
  
  # GZU
  - DOMAIN-SUFFIX,gzu.edu.cn,🏠 Direct

  # 通用规则
  - RULE-SET,private,🏠 Direct
  - RULE-SET,private_ip,🏠 Direct,no-resolve
  - RULE-SET,cn,🏠 Direct
  - RULE-SET,cn_ip,🏠 Direct,no-resolve
  
  - RULE-SET,youtube,📹 YouTube
  
  - RULE-SET,google,🅖 Google
  - RULE-SET,google_ip,🅖 Google,no-resolve
  
  - RULE-SET,github,👨🏿‍💻 GitHub
  
  - RULE-SET,ai,🤖 AI
  
  - RULE-SET,netflix,🎬 Netflix
  - RULE-SET,netflix_ip,🎬 Netflix,no-resolve
  
  - RULE-SET,telegram,✈️ Telegram
  - RULE-SET,telegram_ip,✈️ Telegram,no-resolve
  
  - RULE-SET,tiktok,🎵 TikTok
  
  - RULE-SET,docker,🐳 Docker
  
  - RULE-SET,twitter,𝕏 Twitter
  - RULE-SET,twitter_ip,𝕏 Twitter,no-resolve
  
  - RULE-SET,onedrive,☁️ OneDrive
  - RULE-SET,microsoft,🪟 Microsoft
  
  - RULE-SET,apple,🍎 Apple
  
  - RULE-SET,paypal,💳 PayPal
  
  - RULE-SET,geolocation-!cn,🧭 Proxy Select
  
  - MATCH,🐟 Others
  
rule-anchor:
