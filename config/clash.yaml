proxies:
  - {name: 🟢 直连, type: direct}
proxy-providers:
  Airport1:
    url: "链接"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连

# 全局配置 
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
# interface-name: enp6s18
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

# 入站  
tun:
  enable: false

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private,cn"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

pr: &pr {type: select, proxies: [🟢 直连, 🚀 Proxy Select]}

proxy-groups:
  - {name: 🚀 Proxy Select, type: select,proxies: [🟢 直连], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|C202604211042848"}
  - {name: 📹 YouTube,      type: select, proxies: [🚀 Proxy Select, 🟢 直连], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|C202604211042848"}
  - {name: 🍀 Google,       type: select, proxies: [🚀 Proxy Select, 🟢 直连], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|C202604211042848"}
