  - {name: 🐳 Docker,       type: select, proxies: [🚀 Proxy Select, 🟢 直连], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|C202604211042848"}
  - {name: 🦜 Twitter,      type: select, proxies: [🚀 Proxy Select, 🟢 直连], include-all: true, filter: "(?i)新加坡|日本|台湾|美国|racknerd|cotelforce|mwyou168|C202604211042848"}
