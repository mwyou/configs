port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
# interface-name: enp6s18
log-level: warning
find-process-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# е—…жЋў
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

# е…Ґз«™  
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #дЅїз”ЁnikkiпјЊж··е…Ґе…ЁйѓЁдёЌдї®ж”№зљ„жѓ…е†µпјЊејЂеђЇжЋҐеЏЈжЊ‡е®љдёєnikki
  #дЅїз”Ёд»…е†…ж ёи‡ЄиЎЊдї®ж”№дё‹йќўдё‰йЎ№дёєtrue
  #device: nikki
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNSжЁЎеќ—
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private,cn"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  # nameseverе°Ѕй‡Џз”ЁиїђиђҐе•†жЏђдѕ›зљ„DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

